name: Release

# Security: only triggers on tags and manual dispatch — forks cannot trigger this workflow.
# It requires secrets for signing, notarization, and release publishing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated: macos,linux,windows or 'all')"
        required: true
        default: "all"
        type: string
      tag:
        description: "Release tag (e.g. v0.3.31) — required for manual dispatch"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Determine what to build ──────────────────────────────────────────
  config:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      build_macos: ${{ steps.platforms.outputs.macos }}
      build_linux: ${{ steps.platforms.outputs.linux }}
      build_windows: ${{ steps.platforms.outputs.windows }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - id: platforms
        run: |
          PLATFORMS="${{ inputs.platforms || 'all' }}"
          if [[ "$PLATFORMS" == "all" ]]; then
            echo "macos=true"   >> "$GITHUB_OUTPUT"
            echo "linux=true"   >> "$GITHUB_OUTPUT"
            echo "windows=true" >> "$GITHUB_OUTPUT"
          else
            [[ "$PLATFORMS" == *macos* ]]   && echo "macos=true"   >> "$GITHUB_OUTPUT" || echo "macos=false"   >> "$GITHUB_OUTPUT"
            [[ "$PLATFORMS" == *linux* ]]   && echo "linux=true"   >> "$GITHUB_OUTPUT" || echo "linux=false"   >> "$GITHUB_OUTPUT"
            [[ "$PLATFORMS" == *windows* ]] && echo "windows=true" >> "$GITHUB_OUTPUT" || echo "windows=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Frontend Tests ──────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

  # ── Rust Tests (only for selected platforms) ───────────────────────
  test-rust:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            enabled: ${{ needs.config.outputs.build_macos }}
          - os: ubuntu-22.04
            enabled: ${{ needs.config.outputs.build_linux }}
          - os: windows-latest
            enabled: ${{ needs.config.outputs.build_windows }}
    runs-on: ${{ matrix.os }}
    if: always()
    steps:
      - name: Skip if platform not selected
        if: matrix.enabled != 'true'
        run: echo "Skipping Rust tests for this platform"

      - uses: actions/checkout@v4
        if: matrix.enabled == 'true'
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.enabled == 'true'

      - uses: swatinem/rust-cache@v2
        if: matrix.enabled == 'true'
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.os }}

      - name: Install Linux dependencies
        if: matrix.enabled == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Rust tests
        if: matrix.enabled == 'true'
        working-directory: src-tauri
        run: cargo test

  # ── Build (selected platforms) ─────────────────────────────────────
  build:
    needs: [config, test-frontend, test-rust]
    if: always() && needs.test-frontend.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            platform_key: darwin-aarch64
            sign: true
            notarize: true
            platform_group: macos
          - target: x86_64-apple-darwin
            runner: macos-14
            platform_key: darwin-x86_64
            sign: true
            notarize: true
            platform_group: macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            platform_key: linux-x86_64
            sign: false
            notarize: false
            platform_group: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform_key: linux-aarch64
            sign: false
            notarize: false
            platform_group: linux
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform_key: windows-x86_64
            sign: false
            notarize: false
            platform_group: windows
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            platform_key: windows-aarch64
            sign: false
            notarize: false
            platform_group: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check if this platform is enabled
        id: check
        shell: bash
        run: |
          GROUP="${{ matrix.platform_group }}"
          MACOS="${{ needs.config.outputs.build_macos }}"
          LINUX="${{ needs.config.outputs.build_linux }}"
          WINDOWS="${{ needs.config.outputs.build_windows }}"
          ENABLED=false
          [[ "$GROUP" == "macos"   && "$MACOS"   == "true" ]] && ENABLED=true
          [[ "$GROUP" == "linux"   && "$LINUX"   == "true" ]] && ENABLED=true
          [[ "$GROUP" == "windows" && "$WINDOWS" == "true" ]] && ENABLED=true
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        if: steps.check.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.enabled == 'true'
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        if: steps.check.outputs.enabled == 'true'
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.runner }}

      - name: Install Linux dependencies
        if: steps.check.outputs.enabled == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2

      - run: npm ci
        if: steps.check.outputs.enabled == 'true'

      - name: Validate version matches tag
        if: steps.check.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match tauri.conf.json version $CONF_VERSION"
            exit 1
          fi

      - name: Import macOS signing certificate
        if: steps.check.outputs.enabled == 'true' && matrix.sign && runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and sign
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "${{ matrix.sign && secrets.APPLE_SIGNING_IDENTITY || '' }}"
        run: npx tauri build --target ${{ matrix.target }}

      - name: Notarize DMG
        if: steps.check.outputs.enabled == 'true' && matrix.notarize
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_PATH=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          NOTARIZED=false
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt of 3..."
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 8m; then
              NOTARIZED=true
              break
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 15s..."
              sleep 15
            fi
          done
          if [ "$NOTARIZED" != "true" ]; then
            echo "::error::All 3 notarization attempts failed"
            exit 1
          fi
          xcrun stapler staple "$DMG_PATH"

      - name: Collect installer artifacts
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          INSTALLER_DIR="installer-artifacts"
          mkdir -p "$INSTALLER_DIR"

          # macOS DMG
          if ls "$TARGET_DIR"/dmg/*.dmg 2>/dev/null; then
            cp "$TARGET_DIR"/dmg/*.dmg "$INSTALLER_DIR/"
          fi

          # Linux AppImage and deb
          if ls "$TARGET_DIR"/appimage/*.AppImage 2>/dev/null; then
            cp "$TARGET_DIR"/appimage/*.AppImage "$INSTALLER_DIR/"
          fi
          if ls "$TARGET_DIR"/deb/*.deb 2>/dev/null; then
            cp "$TARGET_DIR"/deb/*.deb "$INSTALLER_DIR/"
          fi

          # Windows NSIS and MSI
          if ls "$TARGET_DIR"/nsis/*.exe 2>/dev/null; then
            cp "$TARGET_DIR"/nsis/*.exe "$INSTALLER_DIR/"
          fi
          if ls "$TARGET_DIR"/msi/*.msi 2>/dev/null; then
            cp "$TARGET_DIR"/msi/*.msi "$INSTALLER_DIR/"
          fi

      - name: Upload installer artifacts
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ide-${{ matrix.platform_key }}-installer
          path: installer-artifacts/
          retention-days: 7

      - name: Collect updater artifacts
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          UPDATER_DIR="updater-artifacts"
          mkdir -p "$UPDATER_DIR"

          # macOS updater bundle (Tauri 2: .app.tar.gz + .sig)
          if ls "$TARGET_DIR"/macos/*.tar.gz 2>/dev/null; then
            cp "$TARGET_DIR"/macos/*.tar.gz "$UPDATER_DIR/"
            cp "$TARGET_DIR"/macos/*.tar.gz.sig "$UPDATER_DIR/" 2>/dev/null || true
          fi

          # Linux updater bundle (Tauri 2: .AppImage + .AppImage.sig)
          for f in "$TARGET_DIR"/appimage/*.AppImage; do
            if [ -f "$f" ]; then
              cp "$f" "$UPDATER_DIR/"
              cp "${f}.sig" "$UPDATER_DIR/" 2>/dev/null || true
            fi
          done

          # Windows updater bundle (Tauri 2: .exe + .exe.sig from nsis)
          for f in "$TARGET_DIR"/nsis/*-setup.exe; do
            if [ -f "$f" ]; then
              cp "$f" "$UPDATER_DIR/"
              cp "${f}.sig" "$UPDATER_DIR/" 2>/dev/null || true
            fi
          done

      - name: Upload updater artifacts
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ide-${{ matrix.platform_key }}-updater
          path: updater-artifacts/
          retention-days: 7

  # ── Assemble Release ────────────────────────────────────────────────
  assemble-release:
    needs: [config, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.config.outputs.version }}
      TAG: ${{ needs.config.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          RELEASE_DIR="release-files"
          mkdir -p "$RELEASE_DIR"

          echo "=== Downloaded artifacts ==="
          find artifacts/ -type f | sort

          # Copy all installer files
          for dir in artifacts/hermes-ide-*-installer; do
            if [ -d "$dir" ]; then
              cp "$dir"/* "$RELEASE_DIR/" 2>/dev/null || true
            fi
          done

          # Copy updater bundles with platform prefix to avoid name collisions
          for dir in artifacts/hermes-ide-*-updater; do
            if [ -d "$dir" ]; then
              PLATFORM_KEY=$(basename "$dir" | sed 's/hermes-ide-//' | sed 's/-updater//')
              for file in "$dir"/*; do
                if [ -f "$file" ]; then
                  BASENAME=$(basename "$file")
                  cp "$file" "$RELEASE_DIR/${PLATFORM_KEY}-${BASENAME}"
                fi
              done
            fi
          done

          echo "=== Release files ==="
          ls -la "$RELEASE_DIR/"

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          REPO="hermes-hq/releases"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — will upload new assets"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Hermes IDE $TAG" \
              --notes "Download the installer for your platform, or update in-app. Full changelog: https://hermes-ide.com/changelog"
          fi

      - name: Upload build artifacts to release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          REPO="hermes-hq/releases"
          RELEASE_DIR="release-files"

          shopt -s nullglob
          FILES=( "$RELEASE_DIR"/* )
          shopt -u nullglob

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No new artifacts to upload"
          else
            gh release upload "$TAG" \
              --repo "$REPO" \
              --clobber \
              "${FILES[@]}"
          fi

      - name: Regenerate manifests from all release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          REPO="hermes-hq/releases"
          RELEASE_DIR="release-files"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # Download all .sig files from the release (includes previously uploaded ones)
          SIG_DIR=$(mktemp -d)
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "*.sig" \
            --dir "$SIG_DIR" \
            --clobber 2>/dev/null || true

          # Get full asset list from release
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name')

          # ── latest.json ───────────────────────────────────────────────
          PLATFORMS_JSON='{}'

          add_platform() {
            local key="$1" pattern="$2"
            local bundle_name sig_content=""
            bundle_name=$(echo "$ASSETS" | grep -E "$pattern" | grep -v '\.sig$' | head -1 || true)
            [ -z "$bundle_name" ] && return 0
            if [ -f "$SIG_DIR/${bundle_name}.sig" ]; then
              sig_content=$(cat "$SIG_DIR/${bundle_name}.sig")
            fi
            PLATFORMS_JSON=$(echo "$PLATFORMS_JSON" | jq \
              --arg k "$key" \
              --arg sig "$sig_content" \
              --arg url "${BASE_URL}/${bundle_name}" \
              '.[$k] = {signature: $sig, url: $url}')
          }

          add_platform "darwin-aarch64"  "^darwin-aarch64-.*\.tar\.gz$"
          add_platform "darwin-x86_64"   "^darwin-x86_64-.*\.tar\.gz$"
          add_platform "linux-x86_64"    "^linux-x86_64-.*\.AppImage$"
          add_platform "linux-aarch64"   "^linux-aarch64-.*\.AppImage$"
          add_platform "windows-x86_64"  "^windows-x86_64-.*-setup\.exe$"
          add_platform "windows-aarch64" "^windows-aarch64-.*-setup\.exe$"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the full changelog at https://hermes-ide.com/changelog" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS_JSON" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > "$RELEASE_DIR/latest.json"

          echo "=== latest.json ==="
          cat "$RELEASE_DIR/latest.json"

          # ── downloads.json ────────────────────────────────────────────
          DL_JSON='{}'

          add_download() {
            local platform="$1" arch="$2" format="$3" pattern="$4"
            local filename
            filename=$(echo "$ASSETS" | grep -E "$pattern" | head -1 || true)
            [ -z "$filename" ] && return 0
            DL_JSON=$(echo "$DL_JSON" | jq \
              --arg p "$platform" --arg a "$arch" --arg f "$format" --arg n "$filename" \
              '.[$p][$a][$f] = $n')
          }

          add_download "macos"   "aarch64" "dmg"      "_aarch64\.dmg$"
          add_download "macos"   "x86_64"  "dmg"      "_x86_64\.dmg$"
          add_download "linux"   "x86_64"  "appimage" "_amd64\.AppImage$"
          add_download "linux"   "x86_64"  "deb"      "_amd64\.deb$"
          add_download "linux"   "aarch64" "appimage" "_arm64\.AppImage$"
          add_download "windows" "x86_64"  "exe"      "_x64-setup\.exe$"
          add_download "windows" "aarch64" "exe"      "_arm64-setup\.exe$"

          jq -n \
            --arg version "$VERSION" \
            --argjson platforms "$DL_JSON" \
            '{version: $version, platforms: $platforms}' \
            > "$RELEASE_DIR/downloads.json"

          echo "=== downloads.json ==="
          cat "$RELEASE_DIR/downloads.json"

          # Upload manifests
          gh release upload "$TAG" \
            --repo "$REPO" \
            --clobber \
            "$RELEASE_DIR/latest.json" \
            "$RELEASE_DIR/downloads.json"

          rm -rf "$SIG_DIR"
